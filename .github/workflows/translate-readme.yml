name: Translate README to Norwegian

on:
  push:
    branches:
      - main
    paths:
      - 'README.md'
  workflow_dispatch:

jobs:
  translate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install translation dependencies
        run: pip install translators==5.9.5

      - name: Translate README to Norwegian
        run: python .github/scripts/translate_readme.py

      - name: Commit updated Norwegian README
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add README.no.md
          git diff --staged --quiet || git commit -m "chore: auto-update Norwegian README translation [skip ci]"
          git push
